# QA: basado en DEV; ajusta ports si deseas cerrar algunos.
# Recomendación: mantener tools disponibles para pruebas integradas.
name: ${PROJECT_NAME}

services:
  mariadb:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}-mariadb
    restart: unless-stopped
    command: ["mariadbd", "--default-time-zone=+00:00"]
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./APP/data/settings/mariadb/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - mariadb_root_password
      - mariadb_password
    ports:
      - "${MARIADB_PORT}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -p\"$$(cat /run/secrets/mariadb_root_password)\""]
      interval: 10s
      timeout: 5s
      retries: 20
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./APP/data/settings/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 30
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ${PROJECT_NAME}-minio
    restart: unless-stopped
    environment:
      TZ: America/Santiago
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - /usr/share/zoneinfo/America/Santiago:/etc/localtime:ro
      - /usr/share/zoneinfo/America/Santiago:/usr/share/zoneinfo/America/Santiago:ro
      - /etc/timezone:/etc/timezone:ro
    secrets:
      - minio_root_password
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  backend:
    build:
      context: .
      dockerfile: ./Data/dokerFile/Dockerfile.backend
    container_name: ${PROJECT_NAME}-backend
    restart: unless-stopped
    environment:
      ENV_NAME: ${ENV_NAME}
      MARIADB_HOST: ${MARIADB_HOST}
      MARIADB_PORT: ${MARIADB_PORT}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      INTERNAL_API_SECRET_FILE: /run/secrets/internal_api_secret
      MINUETAITOR_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/bootstrap_admin_password
    volumes:
      - ./APP/volumes/backend/app:/app
      - ./APP/data/backend_data:/app/_data
    secrets:
      - mariadb_password
      - minio_root_password
      - jwt_secret
      - internal_api_secret
      - bootstrap_admin_password
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  worker:
    build:
      context: .
      dockerfile: ./Data/dokerFile/Dockerfile.worker
    container_name: ${PROJECT_NAME}-worker
    restart: unless-stopped
    environment:
      ENV_NAME: ${ENV_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MAINTENANCE_TEMP_CLEANUP_ALLOWED_SUBDIRS: ${MAINTENANCE_TEMP_CLEANUP_ALLOWED_SUBDIRS:-traces/tmp,render/tmp,uploads/tmp,maintenance/tmp}
      MAINTENANCE_TEMP_CLEANUP_DRY_RUN: ${MAINTENANCE_TEMP_CLEANUP_DRY_RUN:-true}
      MAINTENANCE_TEMP_CLEANUP_SAFETY_GRACE_MINUTES: ${MAINTENANCE_TEMP_CLEANUP_SAFETY_GRACE_MINUTES:-30}
    volumes:
      - ./APP/volumes/worker/app:/app
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  frontend:
    image: node:20-alpine
    container_name: ${PROJECT_NAME}-frontend
    working_dir: /app
    restart: unless-stopped
    command: sh -c "test -d node_modules || npm install; npm run dev"
    volumes:
      - ./APP/volumes/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - NODE_ENV=development
      - VITE_ALLOWED_HOSTS=${FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: ${PROJECT_NAME}-redisinsight
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      TZ: America/Santiago
    volumes:
      - /usr/share/zoneinfo/America/Santiago:/etc/localtime:ro
      - /usr/share/zoneinfo/America/Santiago:/usr/share/zoneinfo/America/Santiago:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME}-mailpit
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    labels:
      - "stack=${PROJECT_NAME}"
      - "env=${ENV_NAME}"

volumes:
  mariadb_data:
    name: ${PROJECT_NAME}_mariadb_data
  redis_data:
    name: ${PROJECT_NAME}_redis_data
  frontend_node_modules:
  minio_data:
    name: ${PROJECT_NAME}_minio_data

secrets:
  mariadb_password:
    file: ./.secrets/mariadb_password
  mariadb_root_password:
    file: ./.secrets/mariadb_root_password
  minio_root_password:
    file: ./.secrets/minio_root_password
  jwt_secret:
    file: ./.secrets/jwt_secret
  internal_api_secret:
    file: ./.secrets/internal_api_secret
  bootstrap_admin_password:
    file: ./.secrets/bootstrap_admin_password
