<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ general_info.subject | default('Minuta de Reunión') }}{% endblock %}</title>
  <style>
    /* ============================================================
       BASE.HTML — CSS Global embebido (sin links externos)
       Fusión de general.css + estilos de impresión para Gotenberg
    ============================================================ */

    :root {
      --primary:        #1f3c88;
      --primary-dark:   #162d66;
      --primary-soft:   #eef3fc;
      --secondary:      #f8fafc;
      --surface:        #ffffff;
      --bg:             #f2f4f8;
      --text:           #1f2937;
      --muted:          #667085;
      --line:           #d6deea;
      --line-strong:    #bcc8da;
      --success-bg:     #ecfdf3;
      --success-tx:     #166534;
      --warning-bg:     #fff7ed;
      --warning-tx:     #9a3412;
      --danger-bg:      #fef2f2;
      --danger-tx:      #991b1b;
      --neutral-bg:     #f3f4f6;
      --neutral-tx:     #4b5563;
      --shadow:         0 10px 28px rgba(15,23,42,0.08);
      --radius:         12px;
      --radius-lg:      16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Paginación para Gotenberg ────-─────────────────────── */
    .page {
      width: auto;
      min-height: auto;
      position: relative;
      page-break-after: always;
      background: #fff;
    }
    .page:last-child { page-break-after: auto; }

    /* Evitar corte dentro de bloques */
    table            { break-inside: auto; page-break-inside: auto; }
    .scope-block,
    .scope-item      { break-inside: avoid; }
    .signature-box   { break-inside: avoid; }
    tr, th, td       { break-inside: avoid; page-break-inside: avoid; }

    /* thead repetido en tablas multipágina */
    thead { display: table-header-group; }
    tfoot { display: table-footer-group; }

    @page {
      size: A4;
      margin: 14mm 15mm 16mm 15mm;
    }
    @media print {
      body { background: #fff; }
    }

    /* ── Tipografía ─────────────────────────────────────────── */
    h1, h2, h3, h4, p { margin-top: 0; }
    p, li, td, th {
      orphans: 3;
      widows: 3;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .section-title {
      margin: 18px 0 10px 0;
      padding: 8px 12px;
      border-left: 4px solid var(--primary);
      background: var(--primary-soft);
      border-radius: 10px;
      color: var(--primary-dark);
      font-size: 16px;
      font-weight: 700;
    }

    .section-subtitle {
      margin: 14px 0 8px 0;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .section-note {
      margin: -2px 0 10px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .pdf-section {
      margin-bottom: 18px;
    }

    .pdf-section--keep {
      break-inside: avoid-page;
      page-break-inside: avoid;
    }

    .pdf-section--new-page {
      break-before: page;
      page-break-before: always;
    }

    .pdf-section-header {
      break-after: avoid-page;
      page-break-after: avoid;
    }

    .pdf-section-header .section-title:last-child,
    .pdf-section-header .section-note:last-child,
    .pdf-section-header .section-subtitle:last-child {
      margin-bottom: 0;
    }

    .section-table-caption {
      caption-side: top;
      text-align: left;
      padding: 0 0 10px 0;
    }

    .section-table-caption .section-title,
    .section-table-caption .section-note {
      break-after: avoid-page;
      page-break-after: avoid;
    }

    /* ── Tablas base ────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      font-size: 13px;
    }
    th {
      background: #eef2f6;
      color: #1a4b8c;
      font-weight: 600;
      padding: 12px 10px;
      text-align: left;
      border: 1px solid #d0d7de;
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    td {
      padding: 10px;
      border: 1px solid #d0d7de;
      vertical-align: top;
    }

    /* ── Badges / chips ─────────────────────────────────────── */
    .chip, .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .chip { background: var(--primary-soft); color: var(--primary-dark); }

    .badge.status-pending  { background: var(--warning-bg);  color: var(--warning-tx); }
    .badge.status-open     { background: #eff6ff;             color: var(--primary-dark); }
    .badge.status-closed   { background: var(--success-bg);   color: var(--success-tx); }
    .badge.status-neutral  { background: var(--neutral-bg);   color: var(--neutral-tx); }
    .badge.priority-high   { background: var(--danger-bg);    color: var(--danger-tx); }
    .badge.priority-medium { background: var(--warning-bg);   color: var(--warning-tx); }
    .badge.priority-low    { background: #eff6ff;             color: var(--primary-dark); }
    .badge.priority-critical { background: #450a0a;           color: #fca5a5; }

    /* ── Listas ─────────────────────────────────────────────── */
    .clean-list { margin: 0; padding-left: 18px; }
    .clean-list li { margin: 4px 0; }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      color: var(--muted);
      font-style: italic;
      padding: 20px;
      text-align: center;
      background: var(--secondary);
      border-radius: 6px;
    }

    /* ── Tags ───────────────────────────────────────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Footer de página ───────────────────────────────────── */
    .footer-note {
      margin-top: 30px;
      padding-top: 15px;
      border-top: 1px dashed var(--line);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .page-number {
      position: absolute;
      right: 15mm;
      bottom: 8mm;
      color: var(--muted);
      font-size: 11px;
    }

    /* ── Info grid (ficha de documento) ─────────────────────── */
    .info-grid-doc {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 25px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
    }
    .info-item-doc {
      border-right: 1px solid #d0d7de;
      padding-right: 15px;
    }
    .info-item-doc:last-child { border-right: none; }
    .info-label-doc {
      font-size: 10px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .info-value-doc { font-size: 14px; font-weight: 600; color: #1a1a1a; }

    /* ── Firmas ─────────────────────────────────────────────── */
    .signatures {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }
    .signature-box-base {
      border-top: 1px solid #2d2d2d;
      padding-top: 10px;
      margin-top: 20px;
    }
    .signature-name-base { font-weight: 600; color: #1a4b8c; }
    .signature-role-base { font-size: 11px; color: #666; margin-top: 3px; }

    /* ── Watermark BORRADOR ─────────────────────────────────── */
    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 90px;
      font-weight: 900;
      color: rgba(200, 50, 50, 0.10);
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      letter-spacing: 8px;
      user-select: none;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  {# ── Watermark condicional ────────────────────────────────── #}
  {% if options is defined and options.watermark %}
  <div class="watermark">BORRADOR</div>
  {% endif %}

  {% block content %}{% endblock %}

</body>
</html>
