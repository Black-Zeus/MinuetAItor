<tr>
  <td style="padding:22px 28px;background:#f8fafc;border-bottom:1px solid #e5e7eb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
      <tr>
        <td valign="middle" style="width:64px;padding-right:16px;">
          {% if HAS_ORGANIZATION_LOGO %}
          <img src="cid:{{ ORGANIZATION_LOGO_CID }}"
               width="56"
               height="56"
               alt="{{ ORGANIZATION_NAME }}"
               style="display:block;border:0;max-width:56px;max-height:56px;border-radius:12px;" />
          {% else %}
          <div style="width:56px;height:56px;font-size:1px;line-height:1px;">&nbsp;</div>
          {% endif %}
        </td>
        <td valign="middle">
          <div style="font-size:18px;line-height:24px;font-weight:700;color:#111827;">
            {{ ORGANIZATION_NAME }}
          </div>
          <div style="font-size:13px;line-height:18px;color:#6b7280;margin-top:2px;">
            {{ EMAIL_HEADER_SUBTITLE }}
          </div>
        </td>
        <td align="right" valign="middle">
          <span style="display:inline-block;min-width:68px;text-align:center;padding:6px 12px;border-radius:999px;background:{{ EMAIL_BADGE_BG }};border:1px solid {{ EMAIL_BADGE_BORDER }};color:{{ EMAIL_BADGE_COLOR }};font-size:12px;line-height:16px;font-weight:700;">
            {{ EMAIL_BADGE_TEXT }}
          </span>
        </td>
      </tr>
    </table>
  </td>
</tr>
