<tr>
  <td style="background:#f8fafc;border-top:1px solid #e5e7eb;padding:20px 28px;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
      <tr>
        <td valign="middle" style="width:64px;padding-right:16px;">
          <img src="cid:{{ APP_LOGO_CID }}"
               width="56"
               height="56"
               alt="{{ APP_NAME }}"
               style="display:block;border:0;max-width:56px;max-height:56px;border-radius:12px;" />
        </td>
        <td valign="middle">
          <div style="font-size:18px;line-height:24px;font-weight:700;color:#111827;">
            {{ APP_NAME }}
          </div>
          <div style="font-size:13px;line-height:18px;color:#6b7280;margin-top:2px;">
            {{ EMAIL_FOOTER_SUBTITLE }}
          </div>
        </td>
        <td align="right" valign="middle" style="font-size:11px;line-height:17px;color:#6b7280;text-align:right;word-break:break-word;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="right" style="border-collapse:collapse;">
            <tr>
              <td align="right" style="font-size:11px;line-height:17px;color:#374151;font-weight:700;white-space:nowrap;padding:0 2px 0 0;">
                Evento auditado
              </td>
              <td align="center" style="font-size:11px;line-height:17px;color:#374151;font-weight:700;white-space:nowrap;padding:0 4px;">
                :
              </td>
              <td align="left" style="font-size:11px;line-height:17px;color:#6b7280;white-space:nowrap;padding:0;">
                {{ EMAIL_AUDIT_EVENT_ID }}
              </td>
            </tr>
            <tr>
              <td align="right" style="font-size:11px;line-height:17px;color:#374151;font-weight:700;white-space:nowrap;padding:0 2px 0 0;">
                Origen
              </td>
              <td align="center" style="font-size:11px;line-height:17px;color:#374151;font-weight:700;white-space:nowrap;padding:0 4px;">
                :
              </td>
              <td align="left" style="font-size:11px;line-height:17px;color:#6b7280;white-space:nowrap;padding:0;">
                {{ REQUEST_ORIGIN }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td colspan="3" align="center" style="padding-top:14px;">
          <div style="width:80%;height:1px;background:#e5e7eb;font-size:1px;line-height:1px;">&nbsp;</div>
        </td>
      </tr>
      <tr>
        <td colspan="3" align="center" style="padding-top:12px;font-size:11px;line-height:17px;color:#9ca3af;text-align:center;">
          {{ EMAIL_FOOTER_MESSAGE }}<br />
          {{ EMAIL_FOOTER_HELP_TEXT }}
        </td>
      </tr>
    </table>
  </td>
</tr>
