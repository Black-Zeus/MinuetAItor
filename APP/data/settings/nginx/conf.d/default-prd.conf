upstream frontend_upstream { server frontend:5173; }
upstream backend_upstream  { server backend:8000; }
upstream mailpit_upstream { server mailpit:8025; }

server {
  listen 8080;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;
  server_name_in_redirect off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location ^~ /api/internal/ {
    return 404;
  }

  location = /openapi.json {
    return 404;
  }

  location = /api/openapi.json {
    return 404;
  }

  location ~ (^|/)\. {
    return 404;
  }

  location ~* (^|/)(backup|backups|dump|database|db|config|configuration|settings|secrets|phpinfo|server-status|nginx_status)(\.(zip|sql|bak|old|orig|save|tar|tgz|gz|7z|rar|php|txt|json|ya?ml|env))?$ {
    return 404;
  }

  location ~* \.(sql|bak|old|orig|save|tar|tgz|gz|7z|rar)$ {
    return 404;
  }

  location ^~ /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api;
  }

  location /minio/ {
    return 404;
  }

  location /minio-console/ {
    return 404;
  }

  location = /mailpit {
    return 301 /mailpit/;
  }

  location = /maipit {
    return 301 /mailpit/;
  }

  location /maipit/ {
    return 301 /mailpit/;
  }

  location /mailpit/ {
    proxy_pass http://mailpit_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /mailpit;
    proxy_read_timeout 3600s;
  }

  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
